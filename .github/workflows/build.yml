name: build

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Diagnostics
        run: |
          set -x
          node --version
          npm --version
          ls -la
          cat package.json
          head -40 package-lock.json

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: npm test
        run: npm test

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Install dependencies
        run: npm install

      - name: Generate config.xml from customize.json
        run: npm run customize

      - name: Add Android platform
        run: npx cordova platform add android@13.0.0

      - name: Install Cordova plugins
        run: |
          npx cordova plugin add cordova-plugin-ibeacon@3.8.1
          npx cordova plugin add cordova-plugin-background-mode-fixes@0.7.6
          npx cordova plugin add cordova-plugin-android-permissions@1.1.5
          npx cordova plugin add https://github.com/darryncampbell/darryncampbell-cordova-plugin-intent.git

      - name: Build debug APK
        run: npx cordova build android

      - name: Pack cordova-bridge for web server
        run: npm run pack-client

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: slim-browser-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload cordova-bridge
        uses: actions/upload-artifact@v4
        with:
          name: cordova-bridge
          path: dist/cordova-bridge/
          if-no-files-found: error
